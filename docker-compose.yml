services:
  postgres:
    image: postgres:17-alpine
    container_name: mihrab-postgres
    environment:
      POSTGRES_USER: mihrab
      POSTGRES_PASSWORD: mihrab
      POSTGRES_DB: mihrab
    # Host port 5433 avoids clashing with other local Postgres instances.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mihrab -d mihrab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mihrab-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
