steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/mi7rab/mi7rab/app:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/mi7rab/mi7rab/app:latest
      - .

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/mi7rab/mi7rab/app

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - mi7rab
      - --image=us-central1-docker.pkg.dev/mi7rab/mi7rab/app:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --add-cloudsql-instances=mi7rab:us-central1:mi7rab-db
      - --service-account=mi7rab-run@mi7rab.iam.gserviceaccount.com
      - --set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=mi7rab,GCP_BUCKET=mi7rab_resources,BETTER_AUTH_URL=https://ribhielzaru.com,CORS_ORIGINS=https://ribhielzaru.com
      - >-
        --set-secrets=DATABASE_URL=database-url:latest,REDIS_URL=redis-url:latest,BETTER_AUTH_SECRET=better-auth-secret:latest,GCP_KEY_JSON=gcp-key-json:latest

images:
  - us-central1-docker.pkg.dev/mi7rab/mi7rab/app:$SHORT_SHA
  - us-central1-docker.pkg.dev/mi7rab/mi7rab/app:latest

options:
  logging: CLOUD_LOGGING_ONLY
